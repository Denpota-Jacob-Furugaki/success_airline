<style>
  /* ===== FOOTER STYLES ===== */
  .footer {
    position: relative;
    overflow: hidden;
  }

  /* Cloud wave divider */
  .footer-cloud-wave {
    width: 100%;
    height: 220px;
    position: relative;
    overflow: hidden;
  }
  .footer-cloud-wave svg {
    position: absolute;
    width: 100%;
    height: 100%;
    bottom: 0;
    left: 0;
  }

  .footer-content {
    background: #FFDFDF;
    padding: 60px 40px 30px;
  }

  /* Two-column layout: logo left, nav right */
  .footer-main {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    gap: 60px;
    align-items: flex-start;
  }

  /* Logo circle */
  .footer-brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }
  .footer-logo-circle {
    width: 200px;
    height: 200px;
    position: relative;
  }
  .footer-logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* Nav list on the right */
  .footer-nav-list {
    flex: 0 1 400px;
    margin-left: auto;
  }
  .footer-nav-item {
    display: flex;
    align-items: center;
    height: 44px;
    border-bottom: 0.5px solid #343434;
  }
  .footer-nav-item a {
    font-family: 'Shippori Mincho', 'Yu Mincho', serif;
    font-size: 16px;
    font-weight: 400;
    color: #343434;
    letter-spacing: 1.6px;
    transition: color 0.3s;
  }
  .footer-nav-item a:hover { color: #f49b9b; }

  /* Social icons below nav */
  .footer-social-icons {
    display: flex;
    gap: 16px;
    margin-top: 24px;
    padding-top: 8px;
  }
  .footer-social-icons a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 2px 4px rgba(97, 58, 58, 0.15);
    transition: opacity 0.3s;
  }
  .footer-social-icons a:hover { opacity: 0.8; }
  .footer-social-icons a img {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }
  .footer-social-icons .note-icon {
    border-radius: 8px;
  }
  .footer-social-icons .note-icon img {
    width: 32px;
    height: 32px;
  }

  /* CTA buttons row */
  .footer-cta-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin: 40px 0 30px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .footer-cta-btn {
    width: 252px;
    padding: 10px 20px;
    background: #F8BBBB;
    color: #343434;
    border-radius: 30px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    letter-spacing: 2px;
    line-height: 30px;
    box-shadow: 0 4px 4px rgba(0, 0, 0, 0.25);
    transition: opacity 0.3s;
  }
  .footer-cta-btn:hover { opacity: 0.85; }

  /* Copyright */
  .footer-copyright {
    text-align: center;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: #343434;
    padding: 20px 0;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* SP footer nav (mobile only) */
  .sp-footer-nav {
    display: none;
  }

  /* ===== FOOTER MOBILE ===== */
  @media (max-width: 767px) {
    .footer-cloud-wave {
      height: 140px;
    }
    .footer-main {
      flex-direction: column;
      gap: 30px;
      align-items: center;
    }
    .footer-nav-list {
      margin-left: 0;
      flex: none;
      width: 100%;
    }
    .footer-cta-row {
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .footer-cta-btn {
      width: 80%;
      max-width: 300px;
      font-size: 16px;
    }
    .sp-footer-nav {
      display: block;
      padding: 0 28px;
    }
    .sp-footer-nav .footer-nav-item {
      display: flex;
      align-items: center;
      height: 34px;
      border-bottom: 0.5px solid #343434;
      margin-bottom: 20px;
    }
    .sp-footer-nav .footer-nav-item a {
      font-family: 'Shippori Mincho', serif;
      font-size: 16px;
      color: #000;
    }
  }
</style>
